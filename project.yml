name: LeetCodeLytics
options:
  bundleIdPrefix: com.leetcodelytics
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  LeetCodeLytics:
    type: application
    platform: iOS
    sources:
      - LeetCodeLytics
      - Shared
    info:
      path: LeetCodeLytics/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - leetcodelytics
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.leetcodelytics.app
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 2.1.0
        ENABLE_TESTABILITY: YES
        CODE_SIGN_ENTITLEMENTS: LeetCodeLytics/LeetCodeLytics.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - sdk: WidgetKit.framework
      - target: LeetCodeLyticsWidget
        embed: true

  LeetCodeLyticsWidget:
    type: app-extension
    platform: iOS
    sources:
      - LeetCodeLyticsWidget
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.leetcodelytics.app.widget
        INFOPLIST_FILE: LeetCodeLyticsWidget/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 2.1.0
        CODE_SIGN_ENTITLEMENTS: LeetCodeLyticsWidget/LeetCodeLyticsWidget.entitlements
        SKIP_INSTALL: YES
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

  LeetCodeLyticsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - LeetCodeLyticsTests
    dependencies:
      - target: LeetCodeLytics
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.leetcodelytics.app.tests
        GENERATE_INFOPLIST_FILE: YES
