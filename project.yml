name: LeetAnalytics
options:
  bundleIdPrefix: com.leetanalytics
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  LeetAnalytics:
    type: application
    platform: iOS
    sources:
      - LeetAnalytics
      - Shared
    info:
      path: LeetAnalytics/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        BGTaskSchedulerPermittedIdentifiers:
          - com.leetanalytics.app.refresh
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - leetanalytics
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.leetanalytics.app
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.4.4
        ENABLE_TESTABILITY: YES
        CODE_SIGN_ENTITLEMENTS: LeetAnalytics/LeetAnalytics.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: ZHH8F344D5
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: WebKit.framework
      - target: LeetAnalyticsWidget
        embed: true

  LeetAnalyticsWidget:
    type: app-extension
    platform: iOS
    sources:
      - LeetAnalyticsWidget
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.leetanalytics.app.widget
        INFOPLIST_FILE: LeetAnalyticsWidget/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.4.4
        CODE_SIGN_ENTITLEMENTS: LeetAnalyticsWidget/LeetAnalyticsWidget.entitlements
        SKIP_INSTALL: YES
        DEVELOPMENT_TEAM: ZHH8F344D5
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

  LeetAnalyticsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - LeetAnalyticsTests
    dependencies:
      - target: LeetAnalytics
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.leetanalytics.app.tests
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: ZHH8F344D5
